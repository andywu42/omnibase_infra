    seed_cost_per_1k_tokens: 0.0
    seed_tokens_per_sec: 50
    hardware: "M2 Ultra"
    tier: local
  - model_key: "claude-sonnet"
    provider: anthropic
    transport: oauth # Claude Code uses OAuth, not ANTHROPIC_API_KEY
    capabilities:
      - code_generation
      - reasoning
      - vision
      - computer_use
      - documentation
    context_window: 200000
