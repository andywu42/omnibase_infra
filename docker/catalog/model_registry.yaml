#
# Intelligent Model Router — Model Registry
# Contract-driven registry of available LLM endpoints.
# Seed values are bootstrap estimates; live metrics override after sufficient data.
#
# Ticket: OMN-7270
models:
  - model_key: "qwen3-coder-30b"
    provider: local
    transport: http
    base_url_env: LLM_CODER_URL
    capabilities:
      - code_generation
      - refactoring
      - documentation
    context_window: 65536
    seed_cost_per_1k_tokens: 0.0
    seed_tokens_per_sec: 201
    hardware: "RTX 5090"
    tier: local
  - model_key: "qwen3-14b"
    provider: local
    transport: http
    base_url_env: LLM_CODER_FAST_URL
    capabilities:
      - code_generation
      - classification
      - routing
    context_window: 40960
    seed_cost_per_1k_tokens: 0.0
    seed_tokens_per_sec: 93
    hardware: "RTX 4090"
    tier: local
  - model_key: "deepseek-r1-32b"
    provider: local
    transport: http
    base_url_env: LLM_DEEPSEEK_R1_URL
    capabilities:
      - deep_reasoning
      - code_review
      - math
    context_window: 32768
    seed_cost_per_1k_tokens: 0.0
    seed_tokens_per_sec: 6.5
    hardware: "M2 Ultra"
    tier: local
  - model_key: "qwen3-next-80b"
    provider: local
    transport: http
