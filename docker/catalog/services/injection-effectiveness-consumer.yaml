name: injection-effectiveness-consumer
description: Consumes injection effectiveness metrics from Kafka for observability
image: runtime:latest
layer: runtime
container_name: omninode-injection-effectiveness-consumer
required_env:
  - OMNIBASE_INFRA_INJECTION_EFFECTIVENESS_POSTGRES_DSN
hardcoded_env:
  OMNIBASE_INFRA_INJECTION_EFFECTIVENESS_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  OMNIBASE_INFRA_INJECTION_EFFECTIVENESS_HEALTH_CHECK_PORT: '8088'
  OMNIBASE_INFRA_INJECTION_EFFECTIVENESS_HEALTH_CHECK_HOST: 0.0.0.0
operational_defaults:
  ONEX_LOG_LEVEL: INFO
  ONEX_ENVIRONMENT: local
  OMNIMEMORY_ENABLED: 'false'
ports:
  external: 8088
  internal: 8088
healthcheck:
  test: curl -sf http://localhost:8088/health
  interval_s: 30
  timeout_s: 10
  retries: 3
  start_period_s: 40
depends_on:
  - service: migration-gate
    condition: service_healthy
  - service: redpanda
    condition: service_healthy
restart: unless-stopped
resources:
  cpus: '0.5'
  memory: 256M
  cpus_reservation: '0.1'
  memory_reservation: 64M
stop_grace_period: 60s
command:
  - python
  - -m
  - omnibase_infra.services.observability.injection_effectiveness.consumer
labels:
  com.omninode.service: injection-effectiveness-consumer
  com.omninode.layer: runtime
  com.omninode.version: ${RUNTIME_VERSION:-0.1.0}
  autoheal: 'true'
