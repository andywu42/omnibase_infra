name: ci-relay
description: GitHub CI webhook relay — publishes PR status events to Kafka
image: runtime:latest
layer: runtime
container_name: omninode-ci-relay
required_env:
  - CI_CALLBACK_TOKEN
hardcoded_env:
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  CI_RELAY_HOST: 0.0.0.0
  CI_RELAY_PORT: '8089'
operational_defaults:
  ONEX_LOG_LEVEL: INFO
  ONEX_ENVIRONMENT: local
ports:
  external: 8089
  internal: 8089
healthcheck:
  test: curl -sf http://localhost:8089/health
  interval_s: 30
  timeout_s: 10
  retries: 3
  start_period_s: 20
depends_on:
  - service: redpanda
    condition: service_healthy
restart: unless-stopped
resources:
  cpus: '0.25'
  memory: 128M
  cpus_reservation: '0.1'
  memory_reservation: 64M
stop_grace_period: 30s
command:
  - uvicorn
  - omniclaude.services.ci_relay.app:create_app
  - --factory
  - --host
  - 0.0.0.0
  - --port
  - '8089'
labels:
  com.omninode.service: ci-relay
  com.omninode.layer: runtime
  com.omninode.version: ${RUNTIME_VERSION:-0.1.0}
  autoheal: 'true'
