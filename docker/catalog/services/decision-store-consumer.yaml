name: decision-store-consumer
description: Persists LLM model selection decisions from Kafka to PostgreSQL
image: runtime:latest
layer: runtime
container_name: omninode-decision-store-consumer
required_env: []
hardcoded_env:
  OMNIINTELLIGENCE_DB_URL: 'postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/omniintelligence'
  DECISION_STORE_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  DECISION_STORE_HEALTH_CHECK_PORT: '8091'
  DECISION_STORE_HEALTH_CHECK_HOST: 0.0.0.0
operational_defaults:
  ONEX_LOG_LEVEL: INFO
  ONEX_ENVIRONMENT: local
  OMNIMEMORY_ENABLED: 'false'
ports:
  external: 8091
  internal: 8091
healthcheck:
  test: curl -sf http://localhost:8091/health
  interval_s: 30
  timeout_s: 10
  retries: 3
  start_period_s: 40
depends_on:
  - service: migration-gate
    condition: service_healthy
  - service: redpanda
    condition: service_healthy
restart: unless-stopped
resources:
  cpus: '0.25'
  memory: 128M
  cpus_reservation: '0.1'
  memory_reservation: 64M
stop_grace_period: 60s
command:
  - python
  - -m
  - omniintelligence.decision_store.consumer
labels:
  com.omninode.service: decision-store-consumer
  com.omninode.layer: runtime
  com.omninode.version: ${RUNTIME_VERSION:-0.1.0}
  autoheal: 'true'
