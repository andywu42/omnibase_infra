# docker-compose.infra.yml
# ONEX Infrastructure & Runtime Services
#
# This compose file provides the complete ONEX platform: infrastructure services
# (PostgreSQL, Valkey, Redpanda) and runtime services (kernel, effects, workers).
# OMN-3431: Local Docker Redpanda replaces the remote M2 Ultra broker (always-on).
# Broker addresses are hardcoded as literals (not interpolated from host env).
#
#
# Usage:
#   # Core infrastructure only (postgres, valkey, redpanda)
#   docker compose -f docker/docker-compose.infra.yml up -d
#
#   # With runtime services
#   docker compose -f docker/docker-compose.infra.yml --profile runtime up -d
#
#   # With secrets management (Infisical)
#   docker compose -f docker/docker-compose.infra.yml --profile secrets up -d
#
#   # With Keycloak (local OIDC/auth)
#   docker compose -f docker/docker-compose.infra.yml --profile auth up -d
#
#   # Full stack (all services)
#   docker compose -f docker/docker-compose.infra.yml --profile full up -d
#
#   # Bootstrap mode (ordered startup with Infisical seed)
#   # Prefer using scripts/bootstrap-infisical.sh instead for the full sequence.
#   docker compose -f docker/docker-compose.infra.yml --profile bootstrap up -d
#
#   # Build runtime and start
#   docker compose -f docker/docker-compose.infra.yml --profile runtime up -d --build
#
#   # Stop services
#   docker compose -f docker/docker-compose.infra.yml down
#
#   # Stop and remove volumes (CAUTION: destroys data)
#   docker compose -f docker/docker-compose.infra.yml down -v
#
# Profiles:
#   - (default): Core infrastructure (postgres, valkey, redpanda)
#   - runtime: ONEX runtime services (omninode-runtime, effects, workers, observability)
#   - secrets: Infisical for secrets management
#   - auth: Keycloak OIDC/auth service (local dev)
#   - full: All services (infrastructure + runtime + secrets + auth)
#   - bootstrap: Infrastructure + secrets (for bootstrap-infisical.sh sequence)
#
# Redpanda / Kafka:
#   OMN-3431: Local Docker Redpanda is the default event bus (always-on, no profile needed).
#   Containers use redpanda:9092 (Docker-internal). Host scripts use localhost:19092.
#   Invariant: NO Docker service inherits KAFKA_BOOTSTRAP_SERVERS from the host environment.
#              All broker addresses are hardcoded literals in compose.
#
# External Ports:
#   Infrastructure:
#     - PostgreSQL: 5436 (internal 5432)
#     - Valkey: 16379 (internal 6379)
#     - Redpanda: 19092 (internal 9092) [always-on]
#     - Infisical: 8880 (internal 8080) [secrets profile]
#     - Keycloak: 28080 (internal 8080) [auth profile]
#   Runtime:
#     - omninode-runtime: 8085 [runtime profile]
#     - runtime-effects: 8086 [runtime profile]
#     - agent-actions-consumer: 8087 [runtime profile]
#     - intelligence-api: 8053 [runtime profile]
#     - contract-resolver: 8091 [runtime profile] (OMN-2756 transitional bridge)
#     - skill-lifecycle-consumer: 8092 [runtime profile] (OMN-2934)
#     - phoenix: 6006 [runtime profile] (OMN-3542, LLM observability OTLP HTTP + UI)
#
# Dashboard Requirements (OMN-3337):
#   Several omnidash dashboards require the runtime profile to be active:
#
#   Cost Trends dashboard (llm_cost_aggregates):
#     Requires: --profile runtime
#     Producer: runtime-effects (NodeLlmInferenceEffect → ServiceLlmMetricsPublisher)
#     Topic:    onex.evt.omniintelligence.llm-call-completed.v1
#     Note: LLM inference calls must be routed through the ONEX node pipeline,
#           not directly to the LLM endpoint, for cost events to be generated.
#
#   Skill Executions dashboard (skill_executions):
#     Requires: --profile runtime
#     Producer: skill-lifecycle-consumer (already wired)
#
#   To start all runtime services:
#     docker compose -f docker/docker-compose.infra.yml --profile runtime up -d
#
name: omnibase-infra
# ==========================================================================
# IMPORTANT: Requires Docker Compose v2.20.0 or later (nested variable expansion).
# Older versions will SILENTLY produce malformed DSNs.
# Verify: docker compose version
# ==========================================================================
# Shared Configuration Templates (YAML Anchors)
# ==========================================================================

# Default healthcheck configuration
x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 10s
# Default logging configuration
x-logging-defaults: &logging-defaults
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
# Runtime service base configuration
x-runtime-base: &runtime-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.runtime
  networks:
    - omnibase-infra-network
  logging: *logging-defaults
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512M
      reservations:
        cpus: '0.25'
        memory: 128M
# Runtime environment variables (OMN-2287: slimmed for Infisical bootstrap)
# When INFISICAL_ADDR is set, the runtime prefetches most config from Infisical.
# Only bootstrap-essential vars remain here; all others come from Infisical.
x-runtime-env: &runtime-env
  # --- Bootstrap essentials (always needed) ---
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  # OMN-4084: Containers always use the Docker-internal hostname postgres:5432 regardless
  # of what ~/.omnibase/.env sets for OMNIBASE_INFRA_DB_URL. The host-side value uses
  # localhost:5436 (external port); the container-side value must use postgres:5432.
  # This override ensures containers are never broken by a host-side localhost:5436 URL.
  OMNIBASE_INFRA_DB_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/omnibase_infra"
  # OMN-3431: Local Docker Redpanda — containers use Docker-internal redpanda:9092
  KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
  # Allowlist lets service_kernel.py's denylist accept Docker-internal redpanda: hostname
  KAFKA_BROKER_ALLOWLIST: "redpanda:"
  BUS_ID: "local"
  ONEX_CONTRACTS_DIR: /app/contracts
  ONEX_LOG_LEVEL: ${ONEX_LOG_LEVEL:-INFO}
  ONEX_ENVIRONMENT: ${ONEX_ENVIRONMENT:-local}
  # --- Infisical config prefetch (OMN-2287) ---
  # Opt-in: config prefetch only activates when INFISICAL_ADDR is non-empty.
  # When the secrets profile IS active, set INFISICAL_ADDR=http://infisical:8080
  # in your .env or via --env-file so containers reach the Infisical service on
  # the compose network. Do NOT use http://localhost:8880 here — that is the
  # host-accessible port and is unreachable inside the container.
  #
  # When the secrets profile is NOT active (Infisical container absent), leave
  # INFISICAL_ADDR unset (or empty) and the runtime falls back to standard
  # environment variable resolution without attempting to contact Infisical.
  INFISICAL_ADDR: ${INFISICAL_ADDR:-}
  INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
  INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
  INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
  # Opt-in strict mode: when set to a non-empty value, missing Infisical keys
  # are treated as fatal errors rather than silent fallbacks. Leave empty
  # (the default) to allow standard environment variable resolution as fallback.
  INFISICAL_REQUIRED: ${INFISICAL_REQUIRED:-}
  # --- Fallback values (used when Infisical is not configured) ---
  VALKEY_HOST: ${VALKEY_HOST:-valkey}
  VALKEY_PORT: ${VALKEY_PORT:-6379}
  VALKEY_PASSWORD: ${VALKEY_PASSWORD:-valkey-dev-password}
  # OmniIntelligence domain plugin
  OMNIINTELLIGENCE_DB_URL: ${OMNIINTELLIGENCE_DB_URL:?OMNIINTELLIGENCE_DB_URL must be set in ~/.omnibase/.env}
  # OmniMemory domain plugin
  OMNIMEMORY_ENABLED: ${OMNIMEMORY_ENABLED:-}
  # OMN-4311: Memgraph connection passthrough (required by PluginMemory after OMN-4310)
  # Default: Docker service name resolvable via omnibase-infra-network DNS.
  # When OMNIMEMORY_ENABLED is unset, PluginMemory.validate_handshake() skips the probe.
  OMNIMEMORY_MEMGRAPH_HOST: ${OMNIMEMORY_MEMGRAPH_HOST:-omnibase-infra-memgraph}
  OMNIMEMORY_MEMGRAPH_PORT: ${OMNIMEMORY_MEMGRAPH_PORT:-7687}
  # OMNIMEMORY_DB_URL uses :- (empty default) so non-memory deployments are unaffected.
  OMNIMEMORY_DB_URL: ${OMNIMEMORY_DB_URL:-}
  # OmniClaude domain plugin (OMN-3182): required by PluginClaude.wire_dispatchers()
  # Hardcoded to venv path — host OMNICLAUDE_CONTRACTS_ROOT points at /Volumes/...
  # which doesn't exist inside the container. The pip-installed package has its
  # nodes at the site-packages path below.
  OMNICLAUDE_CONTRACTS_ROOT: /app/.venv/lib/python3.12/site-packages/omniclaude/nodes
  # OMN-4622: Skills root for topic provisioning (flat-list topics.yaml manifests)
  OMNICLAUDE_SKILLS_ROOT: /app/.venv/lib/python3.12/site-packages/omniclaude/plugins/onex/skills
  # OMN-3894: Enable event-based agent routing in containers. App defaults to false;
  # compose ensures containers always enable it via :-true default.
  USE_EVENT_ROUTING: ${USE_EVENT_ROUTING:-true}
  # --- Keycloak / Auth (auth profile, OMN-3361) ---
  # KEYCLOAK_ADMIN_URL: internal container DNS — NEVER set to localhost here.
  # KEYCLOAK_ISSUER: external browser-visible URL — must match token iss claim.
  KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-http://keycloak:8080}
  KEYCLOAK_REALM: ${KEYCLOAK_REALM:-omninode}
  KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-onex-admin}
  KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
  KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:28080/realms/omninode}
  ONEX_SERVICE_CLIENT_ID: ${ONEX_SERVICE_CLIENT_ID:-onex-service}
  ONEX_SERVICE_CLIENT_SECRET: ${ONEX_SERVICE_CLIENT_SECRET:-}
  # --- Registration lifecycle (OMN-3446) ---
  # Auto-ACK local/internal nodes after introspection. Never set in production —
  # external nodes send their own ack. Default empty = disabled.
  ONEX_REGISTRATION_AUTO_ACK: ${ONEX_REGISTRATION_AUTO_ACK:-}
  # --- OpenTelemetry / Phoenix tracing (OMN-3811) ---
  # Opt-in: tracing only activates when OTEL_EXPORTER_OTLP_ENDPOINT is non-empty.
  # Inside Docker, point to phoenix:6006 (OTLP HTTP). On host, use localhost:6006.
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
  OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-}
# ==========================================================================
# Services
# ==========================================================================
services:
  # ==========================================================================
  # PostgreSQL - Primary Data Store
  # ==========================================================================
  # SECURITY: Database credentials require explicit configuration.
  # Never use default passwords in production environments.
  # Set POSTGRES_PASSWORD in .env or environment before starting.
  postgres:
    image: postgres:16-alpine
    container_name: omnibase-infra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # SECURITY: Password is required and must be explicitly set (no default)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: omnibase_infra
      # Per-service role passwords (DB-SPLIT-05 / OMN-2056)
      # Roles are created only when the corresponding password env var is set.
      # Empty defaults are intentional — the init script treats empty as "skip role".
      # Generate each with: openssl rand -hex 32
      ROLE_OMNIBASE_PASSWORD: ${ROLE_OMNIBASE_PASSWORD:-}
      ROLE_OMNICLAUDE_PASSWORD: ${ROLE_OMNICLAUDE_PASSWORD:-}
      ROLE_OMNIDASH_PASSWORD: ${ROLE_OMNIDASH_PASSWORD:-}
      ROLE_OMNIINTELLIGENCE_PASSWORD: ${ROLE_OMNIINTELLIGENCE_PASSWORD:-}
      ROLE_OMNIMEMORY_PASSWORD: ${ROLE_OMNIMEMORY_PASSWORD:-}
      ROLE_OMNINODE_PASSWORD: ${ROLE_OMNINODE_PASSWORD:-}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5436}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/forward:/docker-entrypoint-initdb.d:ro
    networks:
      - omnibase-infra-network
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d omnibase_infra"]
    logging: *logging-defaults
    restart: unless-stopped
    labels:
      - "com.omninode.service=postgres"
      - "com.omninode.layer=infrastructure"
  # ==========================================================================
  # Redpanda - Kafka-Compatible Event Streaming (LOCAL DOCKER, ALWAYS-ON)
  # ==========================================================================
  # OMN-3431: Local Docker Redpanda replaces the remote M2 Ultra broker.
  # Containers: redpanda:9092 (Docker-internal). Host: localhost:19092 (external).
  # Invariant: NO Docker service inherits KAFKA_BOOTSTRAP_SERVERS from the host env.
  #            All broker addresses are hardcoded literals in compose.
  # Memory: REDPANDA_MEMORY defaults to 8G. Override via env for constrained hosts.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: omnibase-infra-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:${REDPANDA_EXTERNAL_PORT:-19092}
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:${REDPANDA_PANDAPROXY_PORT:-18082}
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory ${REDPANDA_MEMORY:-8G}
      - --admin-addr 0.0.0.0:9644
      - --default-log-level=warn
    ports:
      - "${REDPANDA_EXTERNAL_PORT:-19092}:19092"
      # Pandaproxy (REST API for Kafka)
      - "${REDPANDA_PANDAPROXY_PORT:-18082}:18082"
      # Schema Registry
      - "${REDPANDA_SCHEMA_REGISTRY_PORT:-18081}:18081"
      # OMN-4959: Admin API (used by omnidash event-bus-health-poller)
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - omnibase-infra-network
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      start_period: 30s
    logging: *logging-defaults
    restart: unless-stopped
    labels:
      - "com.omninode.service=redpanda"
      - "com.omninode.layer=infrastructure"
  # ==========================================================================
  # Topic Provisioning
  # ==========================================================================
  # Topics are provisioned by TopicProvisioner on runtime boot (service_kernel.py).
  # The single source of truth for topic names and config is ALL_PLATFORM_TOPIC_SPECS
  # in src/omnibase_infra/topics/platform_topic_suffixes.py.
  #
  # For manual provisioning without the runtime (e.g., development without runtime services):
  #   uv run python -m omnibase_infra.event_bus.service_topic_manager
  # ==========================================================================
  # Valkey - Redis-Compatible Cache and Pub/Sub
  # ==========================================================================
  # SECURITY NOTE: Port 16379 is intentionally exposed for local development.
  # This allows host-based tools and tests to connect directly to Valkey.
  # The default binding to 0.0.0.0 is acceptable for development environments
  # where localhost isolation via host firewall provides sufficient security.
  # Password authentication is enabled by default (VALKEY_PASSWORD=valkey-dev-password).
  # For production, either:
  #   - Remove port exposure and use internal Docker networking only
  #   - Bind to 127.0.0.1: "127.0.0.1:16379:6379"
  #   - Set a strong VALKEY_PASSWORD in .env
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: omnibase-infra-valkey
    # Shell form avoids passing empty string arguments when VALKEY_PASSWORD is unset
    # $$ escapes prevent Docker Compose from interpolating; the container's
    # shell expands VALKEY_PASSWORD from the environment block below.
    command: >-
      sh -c 'valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru $${VALKEY_PASSWORD:+--requirepass "$$VALKEY_PASSWORD"}'
    ports:
      - "${VALKEY_EXTERNAL_PORT:-16379}:6379"
    volumes:
      - valkey_data:/data
    networks:
      - omnibase-infra-network
    environment:
      # Pass password for healthcheck authentication
      # SECURITY: Set VALKEY_PASSWORD in .env for production. Default is for local dev only.
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-valkey-dev-password}
    healthcheck:
      !!merge <<: *healthcheck-defaults
      # Use password for healthcheck if VALKEY_PASSWORD is set
      test: ["CMD-SHELL", "valkey-cli $${VALKEY_PASSWORD:+-a \"$$VALKEY_PASSWORD\" --no-auth-warning} ping | grep -q PONG"]
    logging: *logging-defaults
    restart: unless-stopped
    labels:
      - "com.omninode.service=valkey"
      - "com.omninode.layer=infrastructure"
  # ==========================================================================
  # Memgraph - Graph Database (Optional, omnimemory profile)
  # ==========================================================================
  # Added: OMN-4310 — Memgraph must share omnibase-infra-network so that
  # omninode-runtime (PluginMemory) can reach it. It CANNOT run only in
  # omnimemory/docker-compose.yml (separate network, unreachable from runtime).
  omnibase-infra-memgraph:
    image: "memgraph/memgraph:${MEMGRAPH_VERSION:-2.18.1}"
    container_name: "omnibase-infra-memgraph"
    profiles: ["omnimemory", "full"]
    restart: unless-stopped
    ports:
      - "${MEMGRAPH_BOLT_PORT:-7687}:7687"
      - "${MEMGRAPH_HTTP_PORT:-7444}:7444"
    networks:
      - omnibase-infra-network
    volumes:
      - omnibase-infra-memgraph-data:/var/lib/memgraph
      - omnibase-infra-memgraph-logs:/var/log/memgraph
    environment:
      MEMGRAPH_BOLT_PORT: "${MEMGRAPH_BOLT_PORT:-7687}"
      MEMGRAPH_HTTP_PORT: "${MEMGRAPH_HTTP_PORT:-7444}"
    command: >
      --storage-snapshot-retention-count=2 --storage-wal-enabled=true --storage-snapshot-interval-sec=3600 --log-level=WARNING

    healthcheck:
      # Note: nc (netcat) is available in the official memgraph image.
      # If using a stripped image, fall back to: bash -c 'echo > /dev/tcp/localhost/7687'
      test: ["CMD-SHELL", "nc -z localhost 7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: "${MEMGRAPH_MEMORY_LIMIT_MB:-4096}m"
    labels:
      - "com.omninode.service=memgraph"
      - "com.omninode.layer=infrastructure"
  # ==========================================================================
  # Infisical - Secrets Management (Optional)
  # ==========================================================================
  infisical:
    image: infisical/infisical:v0.146.0-postgres
    container_name: omnibase-infra-infisical
    profiles: ["secrets", "full", "bootstrap"]
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DB_CONNECTION_URI: ${INFISICAL_DB_CONNECTION_URI:?INFISICAL_DB_CONNECTION_URI must be set in ~/.omnibase/.env}
      # Redis URL for Infisical's cache backend (Valkey is Redis-compatible)
      REDIS_URL: ${INFISICAL_REDIS_URL:?INFISICAL_REDIS_URL must be set in ~/.omnibase/.env}
      # SECURITY: INFISICAL_ENCRYPTION_KEY and INFISICAL_AUTH_SECRET must be set
      # in .env (or environment). There are no inline defaults -- the service will
      # refuse to start without them to prevent running with known-insecure keys.
      # Generate with: openssl rand -hex 16 (encryption) / openssl rand -hex 32 (auth)
      # Development defaults are provided in docker/.env.example.
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:?INFISICAL_ENCRYPTION_KEY must be set in .env}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:?INFISICAL_AUTH_SECRET must be set in .env}
      SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:8880}
      TELEMETRY_ENABLED: "false"
    ports:
      - "${INFISICAL_EXTERNAL_PORT:-8880}:8080"
    networks:
      - omnibase-infra-network
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/status"]
      start_period: 60s
    logging: *logging-defaults
    restart: unless-stopped
    labels:
      - "com.omninode.service=infisical"
      - "com.omninode.layer=infrastructure"
  # ==========================================================================
  # Keycloak - OIDC / Auth Service (Auth Profile) [OMN-3361]
  # ==========================================================================
  # Local Keycloak for OIDC authentication in dev. Eliminates dependency on
  # auth.omninode.ai for local development.
  #
  # Usage:
  #   docker compose -f docker/docker-compose.infra.yml --profile auth up -d
  #   # Then provision service clients:
  #   uv run python scripts/provision-keycloak.py --kc-url http://localhost:28080 \
  #     --realm omninode --admin-username admin \
  #     --admin-password "${KEYCLOAK_ADMIN_PASSWORD:-keycloak-dev-password}"
  #
  # Realm JSON is imported at startup via --import-realm (start-dev command).
  # onex-service and onex-admin clients are created dynamically by provision-keycloak.py.
  # No compose healthcheck — provision-keycloak.py handles readiness polling.
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.3
    container_name: omnibase-infra-keycloak
    profiles: ["auth", "full"]
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak-dev-password}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      # KC_HOSTNAME_STRICT_HTTPS removed: not supported in Keycloak 26+
      KC_LOG_LEVEL: INFO
    ports:
      - "28080:8080" # +20000 per omnibase convention; verify no existing service on 28080 before use
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/omninode-realm.json:/opt/keycloak/data/import/omninode-realm.json:ro
    networks:
      - omnibase-infra-network
    depends_on:
      postgres:
        condition: service_healthy
    logging: *logging-defaults
    restart: unless-stopped
    labels:
      - "com.omninode.service=keycloak"
      - "com.omninode.layer=infrastructure"
      - "com.omninode.ticket=OMN-3361"
  # ==========================================================================
  # Forward Migration Runner - Apply pending forward migrations (Runtime Profile) [OMN-4175]
  # ==========================================================================
  # One-shot service that applies any pending SQL files from
  # docker/migrations/forward/ to an existing (warm) Postgres volume.
  # docker-entrypoint-initdb.d only fires on fresh volume init; this service
  # closes the gap by running on every compose up via run-forward-migrations.sh.
  #
  # Migrations are tracked in public.schema_migrations. Already-applied files
  # are skipped (idempotent). migration-gate depends on this service completing
  # successfully before checking the sentinel flag.
  forward-migration:
    image: postgres:16-alpine
    container_name: omnibase-forward-migration
    profiles: ["runtime", "full"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: omnibase_infra
      MIGRATIONS_DIR: /migrations/forward
    volumes:
      - ../scripts/run-forward-migrations.sh:/run-forward-migrations.sh:ro
      - ../docker/migrations/forward:/migrations/forward:ro
    entrypoint: ["sh", "/run-forward-migrations.sh"]
    networks:
      - omnibase-infra-network
    restart: "no"
    logging: *logging-defaults
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
    labels:
      - "com.omninode.service=forward-migration"
      - "com.omninode.layer=infrastructure"
      - "com.omninode.ticket=OMN-4175"
  # ==========================================================================
  # Migration Gate - Boot-Order Sentinel (Runtime Profile) [OMN-3737]
  # ==========================================================================
  # Lightweight healthcheck-only service that gates runtime service startup
  # on all forward migrations being applied. The healthcheck queries
  # db_metadata.migrations_complete (set by migration 037). Runtime services
  # depend on this gate via service_healthy condition.
  #
  # Why: omniintelligence's validate_handshake auto-stamps a schema fingerprint
  # on first boot. If tables like idempotency_records don't exist yet, the
  # fingerprint is wrong and all subsequent boots fail (Audit Gap #7).
  migration-gate:
    image: postgres:16-alpine
    container_name: omnibase-infra-migration-gate
    profiles: ["runtime", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      forward-migration:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: omnibase_infra
    # Stay alive so healthcheck can run; no actual workload.
    entrypoint: ["sh", "-c", "while true; do sleep 3600; done"]
    volumes:
      - ../scripts/check_migrations_complete.sh:/check_migrations_complete.sh:ro
    networks:
      - omnibase-infra-network
    healthcheck:
      test: ["CMD-SHELL", "sh /check_migrations_complete.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    logging: *logging-defaults
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
    labels:
      - "com.omninode.service=migration-gate"
      - "com.omninode.layer=infrastructure"
      - "com.omninode.ticket=OMN-3737"
  # ==========================================================================
  # ONEX Runtime - Main Kernel (Runtime Profile)
  # ==========================================================================
  # Primary runtime service that handles the kernel bootstrap process.
  omninode-runtime:
    !!merge <<: *runtime-base
    container_name: omninode-runtime
    profiles: ["runtime", "full"]
    depends_on:
      migration-gate:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      !!merge <<: *runtime-env
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-omninode-runtime-main}
      RUNTIME_PROFILE: main
      ONEX_INPUT_TOPIC: ${ONEX_INPUT_TOPIC:-requests}
      ONEX_OUTPUT_TOPIC: ${ONEX_OUTPUT_TOPIC:-responses}
      ONEX_GROUP_ID: ${ONEX_GROUP_ID:-onex-runtime-main}
      # OMN-2342: Gate intelligence introspection/heartbeat publishing to this
      # container only. Workers and effects containers inherit x-runtime-env but
      # do NOT set this flag, so they process intelligence events without
      # starting duplicate heartbeat loops for the same deterministic node IDs.
      OMNIINTELLIGENCE_PUBLISH_INTROSPECTION: "true"
    ports:
      - "${RUNTIME_MAIN_PORT:-8085}:8085"
    stop_grace_period: 90s
    volumes:
      - runtime_logs:/app/logs
      - runtime_data:/app/data
      - ../contracts:/app/contracts:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.omninode.service=runtime-main"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
      - "autoheal=true"
  # ==========================================================================
  # ONEX Runtime - Effects Handler (Runtime Profile)
  # ==========================================================================
  # Handles effect nodes for external service interactions.
  runtime-effects:
    !!merge <<: *runtime-base
    container_name: omninode-runtime-effects
    profiles: ["runtime", "full"]
    depends_on:
      omninode-runtime:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      !!merge <<: *runtime-env
      OTEL_SERVICE_NAME: omninode-runtime-effects
      RUNTIME_PROFILE: effects
      ONEX_INPUT_TOPIC: ${ONEX_EFFECTS_INPUT_TOPIC:-effect-requests}
      ONEX_OUTPUT_TOPIC: ${ONEX_EFFECTS_OUTPUT_TOPIC:-effect-responses}
      ONEX_GROUP_ID: ${ONEX_EFFECTS_GROUP_ID:-onex-runtime-effects}
    ports:
      - "${RUNTIME_EFFECTS_PORT:-8086}:8085"
    stop_grace_period: 90s
    volumes:
      - effects_logs:/app/logs
      - effects_data:/app/data
      - ../contracts:/app/contracts:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.omninode.service=runtime-effects"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
      - "autoheal=true"
  # ==========================================================================
  # ONEX Runtime - Workers (Runtime Profile)
  # ==========================================================================
  # Scalable worker containers for parallel compute operations.
  runtime-worker:
    !!merge <<: *runtime-base
    profiles: ["runtime", "full"]
    depends_on:
      omninode-runtime:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      !!merge <<: *runtime-env
      OTEL_SERVICE_NAME: omninode-runtime-worker
      RUNTIME_PROFILE: workers
      ONEX_INPUT_TOPIC: ${ONEX_WORKER_INPUT_TOPIC:-worker-requests}
      ONEX_OUTPUT_TOPIC: ${ONEX_WORKER_OUTPUT_TOPIC:-worker-responses}
      ONEX_GROUP_ID: ${ONEX_WORKER_GROUP_ID:-onex-runtime-workers}
    stop_grace_period: 90s
    volumes:
      - worker_logs:/app/logs
      - ../contracts:/app/contracts:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "com.omninode.service=runtime-worker"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
      - "autoheal=true"
  # ==========================================================================
  # Agent Actions Consumer - Observability (Runtime Profile)
  # ==========================================================================
  # Consumes agent action events from Kafka and persists to PostgreSQL.
  agent-actions-consumer:
    !!merge <<: *runtime-base
    container_name: omninode-agent-actions-consumer
    profiles: ["runtime", "full"]
    depends_on:
      migration-gate:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: ["python", "-m", "omnibase_infra.services.observability.agent_actions.consumer"]
    environment:
      # OMN-3431: Local Docker Redpanda
      OMNIBASE_INFRA_AGENT_ACTIONS_KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      # NOTE: Uses dedicated OMNIBASE_INFRA_AGENT_ACTIONS_POSTGRES_DSN rather than
      # OMNIBASE_INFRA_DB_URL because this consumer uses pydantic-settings with the
      # OMNIBASE_INFRA_AGENT_ACTIONS_ prefix and may use a different DB role.
      OMNIBASE_INFRA_AGENT_ACTIONS_POSTGRES_DSN: ${OMNIBASE_INFRA_AGENT_ACTIONS_POSTGRES_DSN:?OMNIBASE_INFRA_AGENT_ACTIONS_POSTGRES_DSN must be set in ~/.omnibase/.env}
      OMNIBASE_INFRA_AGENT_ACTIONS_BATCH_SIZE: ${AGENT_ACTIONS_BATCH_SIZE:-100}
      OMNIBASE_INFRA_AGENT_ACTIONS_BATCH_TIMEOUT_MS: ${AGENT_ACTIONS_BATCH_TIMEOUT_MS:-1000}
      OMNIBASE_INFRA_AGENT_ACTIONS_HEALTH_CHECK_PORT: "8087"
      OMNIBASE_INFRA_AGENT_ACTIONS_HEALTH_CHECK_HOST: "0.0.0.0"
      ONEX_LOG_LEVEL: ${ONEX_LOG_LEVEL:-INFO}
      ONEX_ENVIRONMENT: ${ONEX_ENVIRONMENT:-local}
      OMNIMEMORY_ENABLED: ${OMNIMEMORY_ENABLED:-false}
    ports:
      - "${AGENT_ACTIONS_CONSUMER_PORT:-8087}:8087"
    stop_grace_period: 60s
    volumes:
      - agent_actions_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "com.omninode.service=agent-actions-consumer"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
      - "autoheal=true"
  # ==========================================================================
  # Skill Lifecycle Consumer - Observability (Runtime Profile) [OMN-2934]
  # ==========================================================================
  # Consumes skill-started and skill-completed events from Kafka and persists
  # them to the skill_executions PostgreSQL table for omnidash monitoring.
  skill-lifecycle-consumer:
    !!merge <<: *runtime-base
    container_name: omninode-skill-lifecycle-consumer
    profiles: ["runtime", "full"]
    depends_on:
      migration-gate:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: ["python", "-m", "omnibase_infra.services.observability.skill_lifecycle.consumer"]
    environment:
      # OMN-3431: Local Docker Redpanda
      OMNIBASE_INFRA_SKILL_LIFECYCLE_KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      OMNIBASE_INFRA_SKILL_LIFECYCLE_POSTGRES_DSN: ${OMNIBASE_INFRA_SKILL_LIFECYCLE_POSTGRES_DSN:?OMNIBASE_INFRA_SKILL_LIFECYCLE_POSTGRES_DSN must be set in ~/.omnibase/.env}
      OMNIBASE_INFRA_SKILL_LIFECYCLE_BATCH_SIZE: ${SKILL_LIFECYCLE_BATCH_SIZE:-100}
      OMNIBASE_INFRA_SKILL_LIFECYCLE_BATCH_TIMEOUT_MS: ${SKILL_LIFECYCLE_BATCH_TIMEOUT_MS:-1000}
      OMNIBASE_INFRA_SKILL_LIFECYCLE_HEALTH_CHECK_PORT: "8092"
      OMNIBASE_INFRA_SKILL_LIFECYCLE_HEALTH_CHECK_HOST: "0.0.0.0"
      ONEX_LOG_LEVEL: ${ONEX_LOG_LEVEL:-INFO}
      ONEX_ENVIRONMENT: ${ONEX_ENVIRONMENT:-local}
    ports:
      - "${SKILL_LIFECYCLE_CONSUMER_PORT:-8092}:8092"
    stop_grace_period: 60s
    volumes:
      - skill_lifecycle_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    labels:
      - "com.omninode.service=skill-lifecycle-consumer"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
      - "autoheal=true"
  # ==========================================================================
  # OmniIntelligence Migration Runner (Runtime Profile) — OMN-4082
  # ==========================================================================
  # One-shot init container that creates the omniintelligence database (if
  # absent) and applies all pending SQL migrations before intelligence-api
  # starts. Uses the bundled SQL files at docker/migrations/intelligence/.
  #
  # Why a separate service: intelligence-api runs uvicorn and has no built-in
  # migration entrypoint. PluginIntelligence.validate_handshake() auto-stamps
  # a schema fingerprint on first boot — if tables are missing the fingerprint
  # is wrong and all subsequent boots fail (Audit Gap #7).
  #
  # This service exits 0 on success; intelligence-api depends on
  # service_completed_successfully so it will not start if migration fails.
  intelligence-migration:
    image: postgres:16-alpine
    container_name: omnibase-intelligence-migration
    profiles: ["runtime", "full"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MIGRATIONS_DIR: /migrations/intelligence
    volumes:
      - ../scripts/run-intelligence-migrations.sh:/run-intelligence-migrations.sh:ro
      - ../docker/migrations/intelligence:/migrations/intelligence:ro
    entrypoint: ["sh", "/run-intelligence-migrations.sh"]
    networks:
      - omnibase-infra-network
    restart: "no"
    logging: *logging-defaults
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
    labels:
      - "com.omninode.service=intelligence-migration"
      - "com.omninode.layer=infrastructure"
      - "com.omninode.ticket=OMN-4082"
  # ==========================================================================
  # OmniIntelligence HTTP API - Pattern Query Service (Runtime Profile)
  # ==========================================================================
  # Serves GET /api/v1/patterns for runtime enforcement nodes.
  # Shares Dockerfile.runtime (omniintelligence==0.5.0 is installed there).
  intelligence-api:
    !!merge <<: *runtime-base
    container_name: omnibase-intelligence-api
    profiles: ["runtime", "full"]
    depends_on:
      migration-gate:
        condition: service_healthy
      intelligence-migration:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    command:
      - uvicorn
      - omniintelligence.api.app:create_app
      - --factory
      - --host
      - "0.0.0.0"
      - --port
      - "8053"
      - --workers
      - "1"
    environment:
      # DatabaseSettings reads POSTGRES_* env vars (env_prefix="POSTGRES_")
      # Must point to the omniintelligence database, not omnibase_infra.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: omniintelligence
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      ONEX_LOG_LEVEL: ${ONEX_LOG_LEVEL:-INFO}
      ONEX_ENVIRONMENT: ${ONEX_ENVIRONMENT:-local}
    ports:
      - "${INTELLIGENCE_API_EXTERNAL_PORT:-8053}:8053"
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8053/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "com.omninode.service=intelligence-api"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
  # ==========================================================================
  # Contract Resolver Bridge - Synchronous HTTP for Dashboard (Runtime Profile)
  # ==========================================================================
  # Transitional HTTP bridge (OMN-2756) that exposes NodeContractResolveCompute
  # via POST /api/nodes/contract.resolve so the dashboard can resolve contracts
  # without a Kafka round-trip. Node-shaped: same contract, same events, same
  # registry entry as the production node. Only the execution path changes when
  # the real ONEX node runner supports HTTP invocation.
  omninode-contract-resolver:
    !!merge <<: *runtime-base
    container_name: omninode-contract-resolver
    profiles: ["runtime", "full"]
    depends_on:
      omninode-runtime:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command:
      - uvicorn
      - omnibase_infra.services.contract_resolver.launcher:app
      - --host
      - "0.0.0.0"
      - --port
      - "8091"
      - --workers
      - "1"
    environment:
      !!merge <<: *runtime-env
      OTEL_SERVICE_NAME: omninode-contract-resolver
      CORS_ORIGINS: ${CONTRACT_RESOLVER_CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:8085}
      CONTRACT_RESOLVER_PORT: "8091"
      ONEX_LOG_LEVEL: ${ONEX_LOG_LEVEL:-INFO}
    ports:
      - "${CONTRACT_RESOLVER_PORT:-8091}:8091"
    stop_grace_period: 30s
    volumes:
      - contract_resolver_logs:/app/logs
      - ../contracts:/app/contracts:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "com.omninode.service=contract-resolver"
      - "com.omninode.layer=runtime"
      - "com.omninode.version=${RUNTIME_VERSION:-0.1.0}"
      - "com.omninode.ticket=OMN-2756"
      - "com.omninode.transitional=true"
  # ==========================================================================
  # Arize Phoenix - LLM Observability (OTLP HTTP Backend) [Runtime Profile]
  # ==========================================================================
  # Arize Phoenix provides LLM observability: traces, spans, and evals for ONEX
  # LLM inference calls. Accepts OTLP HTTP on port 6006 and serves its UI there too.
  # Docker-internal consumers reach Phoenix at phoenix:6006.
  # Host browsers access the UI at http://localhost:6006.
  # OMN-3542: Added as a runtime-profile service alongside intelligence-api.
  phoenix:
    image: arizephoenix/phoenix:13.11.0 # Pinned; update via PR when bumping (OMN-4303)
    container_name: omnibase-infra-phoenix
    profiles: ["runtime", "full"]
    environment:
      PHOENIX_WORKING_DIR: /data
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
    volumes:
      - phoenix_data:/data
    networks:
      - omnibase-infra-network
    healthcheck:
      !!merge <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:6006/healthz || exit 1"]
      start_period: 20s
    logging: *logging-defaults
    restart: unless-stopped
    labels:
      - "com.omninode.service=phoenix"
      - "com.omninode.layer=runtime"
      - "com.omninode.ticket=OMN-3542"
  # ==========================================================================
  # Autoheal - Automatic restart of unhealthy containers (OMN-3428)
  # ==========================================================================
  # Rationale: Docker restart: unless-stopped only fires on process exit, not
  # on healthcheck failure. Kafka consumer services (aiokafka) can enter a
  # permanent retry loop after a broker disconnect without exiting, leaving
  # the container alive but unhealthy. Autoheal fills that gap.
  #
  # Scope: only containers labeled autoheal=true are watched (not infra services
  # like postgres/valkey, which could cascade-fail dependents if restarted).
  #
  # Profiles: runtime, full only. Not active in dev/bootstrap/auth profiles.
  #
  # LOCAL INFRA ONLY: docker.sock mount grants root-equivalent Docker control.
  # Do not use this pattern in shared or multi-user environments.
  #
  # Rollback per-container: remove autoheal=true label from the service in this
  #   file, then: docker compose -f docker/docker-compose.infra.yml --profile runtime up -d --no-build
  # Rollback entire watchdog:
  #   docker compose -f docker/docker-compose.infra.yml --profile runtime stop autoheal
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: omnibase-infra-autoheal
    profiles: ["runtime", "full"]
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *logging-defaults
    labels:
      - "com.omninode.service=autoheal"
      - "com.omninode.layer=infrastructure"
# ==========================================================================
# Network Configuration
# ==========================================================================
networks:
  omnibase-infra-network:
    name: omnibase-infra-network
    driver: bridge
# ==========================================================================
# Volume Configuration
# ==========================================================================
volumes:
  # Infrastructure volumes
  postgres_data:
    name: omnibase-infra-postgres-data
  redpanda_data:
    name: omnibase-infra-redpanda-data
  valkey_data:
    name: omnibase-infra-valkey-data
  keycloak_data:
    name: omnibase-infra-keycloak-data
  # Runtime volumes
  runtime_logs:
    name: omninode-runtime-logs
  runtime_data:
    name: omninode-runtime-data
  effects_logs:
    name: omninode-effects-logs
  effects_data:
    name: omninode-effects-data
  worker_logs:
    name: omninode-worker-logs
  agent_actions_logs:
    name: omninode-agent-actions-logs
  skill_lifecycle_logs:
    name: omninode-skill-lifecycle-logs
  contract_resolver_logs:
    name: omninode-contract-resolver-logs
  phoenix_data:
    name: omnibase-infra-phoenix-data
  # Memgraph volumes (omnimemory profile, OMN-4310)
  omnibase-infra-memgraph-data:
    name: "omnibase-infra-memgraph-data"
  omnibase-infra-memgraph-logs:
    name: "omnibase-infra-memgraph-logs"
