# ONEX Node Contract - Model Health Effect
#
# Intelligent Model Router — probes model endpoints for health/latency.
# Reads model_registry.yaml for endpoint discovery.
#
# Ticket: OMN-7266
#
name: "node_model_health_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: "Probes model endpoints for health, latency, and queue depth."
input_model:
  name: "ModelHealthRequest"
  module: "omnibase_infra.nodes.node_model_health_effect.models.model_health_request"
  description: "Request containing model endpoints to probe."
output_model:
  name: "ModelHealthSnapshot"
  module: "omnibase_infra.nodes.node_model_health_effect.models.model_health_snapshot"
  description: "Aggregated health snapshot across all probed endpoints."
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "probe_health"
      handler:
        name: "HandlerProbeHealth"
        module: "omnibase_infra.nodes.node_model_health_effect.handlers.handler_probe_health"
        handler_type: "HTTP"
metadata:
  description: "Model endpoint health probing for intelligent router"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "effect"
    - "health"
    - "model-router"
    - "llm"
