#
# ONEX Node Contract
# Node: NodeSavingsEstimationCompute
#
# Computes token and cost savings from injection effectiveness data
# and emits savings-estimated events to Kafka for downstream
# projection into the omnidash savings dashboard.
#
# Related Tickets:
#   - OMN-6964: Token savings emitter
#   - OMN-7494: Heuristic savings from validator catches, counterfactual model
name: "node_savings_estimation_compute"
contract_name: "node_savings_estimation_compute"
node_name: "node_savings_estimation_compute"
contract_version:
  major: 0
  minor: 3
  patch: 0
node_version:
  major: 0
  minor: 3
  patch: 0
node_type: "COMPUTE_GENERIC"
description: >
  Compute node for token savings estimation. Takes injection effectiveness data (utilization scores, pattern counts, tokens saved per session) and computes cost savings using tiered model pricing (Opus $15/M input, Sonnet $3/M input). Produces a ModelSavingsEstimate for Kafka emission to onex.evt.omnibase-infra.savings-estimated.v1.

input_model:
  name: "ModelSavingsEstimationInput"
  module: "omnibase_infra.nodes.node_savings_estimation_compute.models"
  description: "Injection effectiveness data for savings computation."
output_model:
  name: "ModelSavingsEstimate"
  module: "omnibase_infra.nodes.node_savings_estimation_compute.models"
  description: "Computed savings estimate with cost breakdown and confidence."
capabilities:
  - name: "savings.estimate"
    description: "Compute token and cost savings from injection effectiveness data"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "savings.estimate"
      handler_class: "HandlerSavingsEstimation"
      handler_module: "omnibase_infra.nodes.node_savings_estimation_compute.handlers.handler_savings_estimation"
      description: "Compute savings from injection effectiveness metrics"
      input_model:
        name: "ModelSavingsEstimationInput"
        module: "omnibase_infra.nodes.node_savings_estimation_compute.models"
        description: "Injection effectiveness data for savings computation."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.evt.omniclaude.session-ended.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.savings-estimated.v1"
topics:
  produces:
    - topic: "onex.evt.omnibase-infra.savings-estimated.v1"
      description: "Token savings estimation events"
      schema: "ModelSavingsEstimate"
  consumes:
    - topic: "onex.evt.omniclaude.session-ended.v1"
      description: "Session ended events that trigger savings estimation computation"
error_handling:
  retry_policy:
    max_retries: 0
    initial_delay_ms: 0
    max_delay_ms: 0
    exponential_base: 1
    retry_on: []
  error_types:
    - name: "SavingsEstimationError"
      description: "Failed to compute savings estimation"
      recoverable: false
    - name: "InsufficientDataError"
      description: "Not enough effectiveness data to compute savings"
      recoverable: false
health_check:
  enabled: true
  endpoint: "/health"
  interval_seconds: 30
  checks:
    - name: "savings_handler_loaded"
      type: "handler"
      critical: true
metadata:
  description: "Estimates token cost savings from injection effectiveness data using tiered model pricing, computing per-session and aggregate ROI metrics"
  author: "OmniNode Team"
  license: "MIT"
  created: "2026-03-29"
  tags:
    - compute
    - savings
    - tokens
    - cost
    - effectiveness
    - attribution
  related_tickets:
    - "OMN-6964"
    - "OMN-7494"
