# ONEX Node Contract - Closeout Effect
#
# Executes close-out phase: merge-sweep, quality gates, release readiness.
#
# Related Tickets:
#   - OMN-7316: node_closeout_effect
#   - OMN-5113: Autonomous Build Loop epic
name: "node_closeout_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: "Executes close-out phase: merge-sweep, quality gates, release readiness."
input_model:
  name: "ModelCloseoutInput"
  module: "omnibase_infra.nodes.node_closeout_effect.models.model_closeout"
  description: "Closeout request with dry_run flag."
output_model:
  name: "ModelCloseoutResult"
  module: "omnibase_infra.nodes.node_closeout_effect.models.model_closeout"
  description: "Closeout outcomes with merge count and gate results."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.cmd.omnibase-infra.build-loop-closeout.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.build-loop-closeout-completed.v1"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "closeout"
      handler:
        name: "HandlerCloseout"
        module: "omnibase_infra.nodes.node_closeout_effect.handlers.handler_closeout"
metadata:
  description: "Closeout effect node for autonomous build loop"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "effect"
    - "build-loop"
    - "closeout"
    - "merge-sweep"
    - "OMN-5113"
  related_tickets:
    - "OMN-7316"
    - "OMN-5113"
