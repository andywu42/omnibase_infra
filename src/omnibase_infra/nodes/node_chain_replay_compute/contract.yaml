# ONEX Node Contract - Chain Replay Compute
#
# Pure computation: adapts a cached chain to a new prompt context.
#
name: "node_chain_replay_compute"
node_type: "COMPUTE_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: >
  Compute node that takes a cached chain and new prompt context, then adapts the chain steps via variable substitution and context adjustment. Returns adapted steps with a confidence score.

input_model:
  name: "ModelChainReplayInput"
  module: "omnibase_infra.nodes.node_chain_orchestrator.models.model_chain_replay_input"
  description: "Cached chain and new prompt context for adaptation."
output_model:
  name: "ModelChainReplayResult"
  module: "omnibase_infra.nodes.node_chain_orchestrator.models.model_chain_replay_result"
  description: "Adapted chain steps with confidence score."
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "chain.replay"
      handler:
        name: "HandlerChainReplay"
        module: "omnibase_infra.nodes.node_chain_replay_compute.handlers.handler_chain_replay"
metadata:
  description: "Chain replay adaptation compute for chain learning"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "compute"
    - "chain-learning"
    - "replay"
