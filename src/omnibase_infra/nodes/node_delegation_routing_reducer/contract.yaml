# ONEX Node Contract
# Node: NodeDelegationRoutingReducer
#
# Deterministic routing reducer for the delegation pipeline.
# Maps (task_type, prompt_length) to a routing decision using
# the local LLM endpoint topology.
#
# Related Tickets:
#   - OMN-7040: Node-based delegation pipeline
name: "node_delegation_routing_reducer"
contract_name: "node_delegation_routing_reducer"
node_name: "node_delegation_routing_reducer"
contract_version:
  major: 0
  minor: 1
  patch: 0
node_version:
  major: 0
  minor: 1
  patch: 0
node_type: "REDUCER_GENERIC"
description: >
  Deterministic routing reducer for the delegation pipeline. Maps task type and prompt token count to a routing decision: which model, endpoint, cost tier, and system prompt to use. Pure function, no I/O. Reads endpoint URLs from environment via contract config dependencies.

input_model:
  name: "ModelDelegationRequest"
  module: "omnibase_infra.nodes.node_delegation_orchestrator.models"
  description: "Delegation command with prompt, task_type, and context."
output_model:
  name: "ModelRoutingDecision"
  module: "omnibase_infra.nodes.node_delegation_routing_reducer.models"
  description: "Routing output with selected model, endpoint, cost tier."
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "delegation.route"
      handler_class: "HandlerDelegationRouting"
      handler_module: "omnibase_infra.nodes.node_delegation_routing_reducer.handlers.handler_delegation_routing"
      description: "Map task type and prompt length to routing decision"
      input_model:
        name: "ModelDelegationRequest"
        module: "omnibase_infra.nodes.node_delegation_orchestrator.models"
        description: "Delegation request to route."
config_dependencies:
  - key: "LLM_CODER_URL"
    description: "Endpoint URL for Qwen3-Coder-30B-A3B (port 8000)"
    required: true
  - key: "LLM_CODER_FAST_URL"
    description: "Endpoint URL for DeepSeek-R1-14B (port 8001)"
    required: false
  - key: "LLM_DEEPSEEK_R1_URL"
    description: "Endpoint URL for DeepSeek-R1-32B (port 8101)"
    required: true
error_handling:
  retry_policy:
    max_retries: 0
    initial_delay_ms: 0
    max_delay_ms: 0
    exponential_base: 1
    retry_on: []
  error_types:
    - name: "RoutingError"
      description: "Failed to determine routing decision for delegation request"
      recoverable: false
    - name: "MissingEndpointError"
      description: "Required LLM endpoint URL not configured"
      recoverable: false
health_check:
  enabled: true
  endpoint: "/health"
  interval_seconds: 30
  checks:
    - name: "routing_handler_loaded"
      type: "handler"
      critical: true
metadata:
  description: "Deterministic routing reducer that maps delegation requests to LLM endpoints based on task type and prompt length."
  author: "OmniNode Team"
  license: "MIT"
  created: "2026-03-30"
  tags:
    - reducer
    - routing
    - delegation
    - llm
  related_tickets:
    - "OMN-7040"
