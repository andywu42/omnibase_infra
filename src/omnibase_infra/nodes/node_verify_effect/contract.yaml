# ONEX Node Contract - Verify Effect
#
# Verifies system health: dashboard, runtime, data flow.
# Non-critical failures = warnings, critical failures block the loop.
#
# Related Tickets:
#   - OMN-7317: node_verify_effect
#   - OMN-5113: Autonomous Build Loop epic
name: "node_verify_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: "Verifies system health before building: dashboard, runtime, data flow."
input_model:
  name: "ModelVerifyInput"
  module: "omnibase_infra.nodes.node_verify_effect.models.model_verify"
  description: "Verification request."
output_model:
  name: "ModelVerifyResult"
  module: "omnibase_infra.nodes.node_verify_effect.models.model_verify"
  description: "Verification results with per-check outcomes."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.cmd.omnibase-infra.build-loop-verify.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.build-loop-verify-completed.v1"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "verify"
      handler:
        name: "HandlerVerify"
        module: "omnibase_infra.nodes.node_verify_effect.handlers.handler_verify"
metadata:
  description: "Verify effect node for autonomous build loop"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "effect"
    - "build-loop"
    - "health-check"
    - "OMN-5113"
  related_tickets:
    - "OMN-7317"
    - "OMN-5113"
