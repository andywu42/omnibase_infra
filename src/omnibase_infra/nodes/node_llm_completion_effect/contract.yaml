# ONEX Node Contract - LLM Completion Effect
#
# Sends prompt/messages to an OpenAI-compatible LLM endpoint and returns
# the completion response.  Ported from archive: ai-dev/containers/autogen_litellm.
#
name: "node_llm_completion_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: >
  Effect node that sends chat completion requests to OpenAI-compatible LLM endpoints (vLLM, LiteLLM, Ollama).  Supports model routing by token count and async streaming.

input_model:
  name: "ModelLLMCompletionRequest"
  module: "omnibase_infra.nodes.node_llm_completion_effect.models.model_llm_completion_request"
  description: "Chat messages, model selection, and generation parameters."
output_model:
  name: "ModelLLMCompletionResult"
  module: "omnibase_infra.nodes.node_llm_completion_effect.models.model_llm_completion_result"
  description: "LLM response text, token usage, and model metadata."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.cmd.omnibase-infra.llm-completion-request.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.llm-completion-completed.v1"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "llm.completion"
      handler:
        name: "HandlerLLMCompletion"
        module: "omnibase_infra.nodes.node_llm_completion_effect.handlers.handler_llm_completion"
dependencies:
  - type: "environment"
    name: "LLM_CODER_URL"
    description: "Base URL for the primary LLM endpoint"
  - type: "environment"
    name: "LLM_CODER_FAST_URL"
    description: "Base URL for the fast/mid-tier LLM endpoint"
error_handling:
  retry_policy:
    max_retries: 2
    initial_delay_ms: 500
    max_delay_ms: 5000
    exponential_base: 2
    retry_on:
      - "InfraConnectionError"
      - "InfraTimeoutError"
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout_ms: 60000
metadata:
  description: "LLM chat completion via OpenAI-compatible endpoints"
  author: "OmniNode Team"
  created: "2026-04-01"
  tags:
    - "effect"
    - "llm"
    - "completion"
    - "inference"
