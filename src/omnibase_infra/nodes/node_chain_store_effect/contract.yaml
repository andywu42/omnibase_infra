# ONEX Node Contract - Chain Store Effect
#
# Persists verified chain trajectories to Qdrant for future retrieval.
#
name: "node_chain_store_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: >
  Effect node that stores a verified chain trajectory and its prompt embedding to the Qdrant onex_chain_trajectories collection for future retrieval.

input_model:
  name: "ModelChainStoreRequest"
  module: "omnibase_infra.nodes.node_chain_orchestrator.models.model_chain_store_request"
  description: "Verified chain and prompt embedding to store."
output_model:
  name: "ModelChainStoreResult"
  module: "omnibase_infra.nodes.node_chain_orchestrator.models.model_chain_store_result"
  description: "Store confirmation with chain ID."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.evt.omnibase-infra.chain-verified.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.chain-stored.v1"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "chain.store"
      handler:
        name: "HandlerChainStore"
        module: "omnibase_infra.nodes.node_chain_store_effect.handlers.handler_chain_store"
error_handling:
  retry_policy:
    max_retries: 2
    initial_delay_ms: 200
    max_delay_ms: 2000
    exponential_base: 2
    retry_on:
      - "InfraConnectionError"
      - "InfraTimeoutError"
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout_ms: 60000
metadata:
  description: "Verified chain trajectory storage to Qdrant"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "effect"
    - "chain-learning"
    - "qdrant"
    - "storage"
