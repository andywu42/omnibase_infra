# ONEX Node Contract - Build Dispatch Effect
#
# Dispatches ticket-pipeline builds via delegation for AUTO_BUILDABLE tickets.
#
# Related Tickets:
#   - OMN-7318: node_build_dispatch_effect
#   - OMN-5113: Autonomous Build Loop epic
name: "node_build_dispatch_effect"
node_type: "EFFECT_GENERIC"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version: "1.0.0"
description: "Dispatches ticket-pipeline builds via delegation."
input_model:
  name: "ModelBuildDispatchInput"
  module: "omnibase_infra.nodes.node_build_dispatch_effect.models.model_build_dispatch"
  description: "Build targets to dispatch."
output_model:
  name: "ModelBuildDispatchResult"
  module: "omnibase_infra.nodes.node_build_dispatch_effect.models.model_build_dispatch"
  description: "Per-ticket dispatch outcomes."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.cmd.omnibase-infra.build-loop-build.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.build-loop-build-completed.v1"
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "dispatch_builds"
      handler:
        name: "HandlerBuildDispatch"
        module: "omnibase_infra.nodes.node_build_dispatch_effect.handlers.handler_build_dispatch"
metadata:
  description: "Build dispatch effect node for autonomous build loop"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "effect"
    - "build-loop"
    - "delegation"
    - "dispatch"
    - "OMN-5113"
  related_tickets:
    - "OMN-7318"
    - "OMN-5113"
