# ONEX Node Contract - Autonomous Loop Orchestrator
#
# Coordinates the 6-phase autonomous build loop cycle.
# Reacts to reducer state, bridges COMPUTE outputs to events.
#
# FSM: IDLE -> CLOSING_OUT -> VERIFYING -> FILLING -> CLASSIFYING -> BUILDING -> COMPLETE -> IDLE
#
# Related Tickets:
#   - OMN-7319: node_autonomous_loop_orchestrator
#   - OMN-5113: Autonomous Build Loop epic
name: "node_autonomous_loop_orchestrator"
contract_name: "node_autonomous_loop_orchestrator"
node_name: "node_autonomous_loop_orchestrator"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version:
  major: 1
  minor: 0
  patch: 0
node_type: "ORCHESTRATOR_GENERIC"
description: >
  Orchestrator that coordinates the 6-phase autonomous build loop cycle.
  Reacts to reducer-approved state transitions and bridges COMPUTE/EFFECT
  node outputs to events for the reducer. Never independently decides
  phase transitions.

input_model:
  name: "ModelLoopStartCommand"
  module: "omnibase_infra.nodes.node_autonomous_loop_orchestrator.models.model_loop_orchestrator"
  description: "Build loop start command with max_cycles, skip_closeout, dry_run."
output_model:
  name: "ModelLoopOrchestratorResult"
  module: "omnibase_infra.nodes.node_autonomous_loop_orchestrator.models.model_loop_orchestrator"
  description: "Final result with per-cycle summaries and aggregate metrics."
event_bus:
  version:
    major: 1
    minor: 0
    patch: 0
  subscribe_topics:
    - "onex.cmd.omnibase-infra.build-loop-start.v1"
  publish_topics:
    - "onex.evt.omnibase-infra.build-loop-started.v1"
    - "onex.evt.omnibase-infra.build-loop-cycle-completed.v1"
    - "onex.evt.omnibase-infra.build-loop-failed.v1"
    - "onex.cmd.omnibase-infra.build-loop-closeout.v1"
    - "onex.cmd.omnibase-infra.build-loop-verify.v1"
    - "onex.cmd.omnibase-infra.build-loop-fill.v1"
    - "onex.cmd.omnibase-infra.build-loop-classify.v1"
    - "onex.cmd.omnibase-infra.build-loop-build.v1"
fsm:
  states:
    - IDLE
    - CLOSING_OUT
    - VERIFYING
    - FILLING
    - CLASSIFYING
    - BUILDING
    - COMPLETE
    - FAILED
  initial_state: IDLE
  terminal_states:
    - COMPLETE
    - FAILED
  transitions:
    - from: IDLE
      to: CLOSING_OUT
      trigger: "start command received"
    - from: IDLE
      to: VERIFYING
      trigger: "start command with skip_closeout"
    - from: CLOSING_OUT
      to: VERIFYING
      trigger: "closeout completed"
    - from: VERIFYING
      to: FILLING
      trigger: "verification passed"
    - from: FILLING
      to: CLASSIFYING
      trigger: "fill completed"
    - from: CLASSIFYING
      to: BUILDING
      trigger: "classification completed"
    - from: BUILDING
      to: COMPLETE
      trigger: "build dispatch completed"
    - from: CLOSING_OUT
      to: FAILED
      trigger: "error"
    - from: VERIFYING
      to: FAILED
      trigger: "error"
    - from: FILLING
      to: FAILED
      trigger: "error"
    - from: CLASSIFYING
      to: FAILED
      trigger: "error"
    - from: BUILDING
      to: FAILED
      trigger: "error"
handler_routing:
  routing_strategy: "payload_type_match"
  handlers:
    - operation: "orchestrate_loop"
      handler_class: "HandlerLoopOrchestrator"
      handler_module: "omnibase_infra.nodes.node_autonomous_loop_orchestrator.handlers.handler_loop_orchestrator"
      description: "Coordinate build loop through all phases"
      input_model:
        name: "ModelLoopStartCommand"
        module: "omnibase_infra.nodes.node_autonomous_loop_orchestrator.models.model_loop_orchestrator"
        description: "Build loop start command."
metadata:
  description: "Autonomous build loop orchestrator coordinating 6-phase cycle"
  author: "OmniNode Team"
  created: "2026-04-02"
  tags:
    - "orchestrator"
    - "build-loop"
    - "fsm"
    - "workflow"
    - "OMN-5113"
  related_tickets:
    - "OMN-7319"
    - "OMN-5113"
