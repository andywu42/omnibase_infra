#
# ONEX Node Contract
# Node: NodeDeltaMetricsEffect
#
# Aggregates per-model, per-subsystem performance rollups from completed
# delta bundles into delta_metrics_by_model.
#
# Related Tickets:
#   - OMN-3142: NodeDeltaBundleEffect + NodeDeltaMetricsEffect
#   - Migration 040: delta_metrics_by_model table
#
# Contract identifiers
name: "node_delta_metrics_effect"
contract_name: "node_delta_metrics_effect"
node_name: "node_delta_metrics_effect"
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version:
  major: 1
  minor: 0
  patch: 0
# Node type
node_type: "EFFECT_GENERIC"
# Description
description: >
  Effect node for per-model performance metrics rollup. Subscribes to bundle
  completion signals from NodeDeltaBundleEffect and upserts aggregated counters
  into delta_metrics_by_model using ON CONFLICT DO UPDATE with incremented
  counters. Supports period-based rollups for dashboard visualization.

# Strongly typed I/O models
input_model:
  name: "ModelIntent"
  module: "omnibase_core.models.reducer.model_intent"
  description: "Intent model with upsert_metrics typed payload."
output_model:
  name: "ModelBackendResult"
  module: "omnibase_infra.models.model_backend_result"
  description: "Output model containing PostgreSQL operation result."
# =============================================================================
# HANDLER ROUTING (Declarative Handler Dispatch)
# =============================================================================
handler_routing:
  routing_strategy: "payload_type_match"
  handlers:
    # Upsert Metrics -- ON CONFLICT DO UPDATE with incremented counters
    - payload_type: "delta_metrics.upsert_metrics"
      handler:
        name: "HandlerUpsertMetrics"
        module: "omnibase_infra.nodes.node_delta_metrics_effect.handlers.handler_upsert_metrics"
      backend: "postgres"
      description: "Upsert rollup into delta_metrics_by_model ON CONFLICT DO UPDATE."
      input_model:
        name: "ModelPayloadUpsertMetrics"
        module: "omnibase_infra.nodes.node_delta_metrics_effect.models.model_payload_upsert_metrics"
      output_fields:
        - success
        - error
        - error_code
        - duration_ms
        - correlation_id
  # Execution configuration
  execution_mode: "sequential"
  partial_failure_handling: false
  aggregation_strategy: "first_match"
# =============================================================================
# ERROR HANDLING (Circuit Breaker + Retry + Sanitization)
# =============================================================================
error_handling:
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout_ms: 60000
    half_open_max_requests: 3
    per_backend: false
    backends:
      - name: "postgres"
        failure_threshold: 5
        reset_timeout_ms: 60000
  retry_policy:
    max_retries: 3
    initial_delay_ms: 100
    max_delay_ms: 5000
    exponential_base: 2
    retry_on:
      - "InfraConnectionError"
      - "InfraTimeoutError"
      - "InfraUnavailableError"
      - "RepositoryExecutionError"
  error_sanitization:
    enabled: true
    utility: "omnibase_infra.utils.util_error_sanitization"
    sanitize_patterns:
      - "password"
      - "secret"
      - "token"
      - "api_key"
      - "connection_string"
  error_types:
    - name: "InfraConnectionError"
      description: "Failed to connect to PostgreSQL"
      recoverable: true
      retry_strategy: "exponential_backoff"
    - name: "InfraTimeoutError"
      description: "PostgreSQL operation timed out"
      recoverable: true
      retry_strategy: "exponential_backoff"
    - name: "InfraUnavailableError"
      description: "PostgreSQL is unavailable (circuit open)"
      recoverable: true
      retry_strategy: "exponential_backoff"
    - name: "RepositoryExecutionError"
      description: "PostgreSQL query execution failed"
      recoverable: true
      retry_strategy: "exponential_backoff"
  error_codes:
    - code: "POSTGRES_CONNECTION_ERROR"
      backend: "postgres"
      operation: "all"
      description: "Connection to PostgreSQL server failed"
      retriable: true
    - code: "POSTGRES_UPSERT_ERROR"
      backend: "postgres"
      operation: "upsert_metrics"
      description: "PostgreSQL metrics upsert failed"
      retriable: false
# IO operations (EFFECT node specific)
io_operations:
  - operation: "upsert_metrics"
    description: "Upsert rollup into delta_metrics_by_model ON CONFLICT DO UPDATE"
    input_fields:
      - correlation_id
      - coding_model
      - subsystem
      - outcome
      - gate_decision
      - is_fix_pr
      - gate_violation_count
      - period_start
      - period_end
    output_fields:
      - success
      - error
      - error_code
      - duration_ms
      - correlation_id
# Dependencies (protocols this node requires)
dependencies:
  - name: "protocol_postgres_adapter"
    type: "protocol"
    class_name: "ProtocolPostgresAdapter"
    module: "omnibase_infra.adapters.protocol_postgres_adapter"
    description: "PostgreSQL database operations"
  - name: "protocol_circuit_breaker_aware"
    type: "protocol"
    class_name: "ProtocolCircuitBreakerAware"
    module: "omnibase_infra.mixins.protocol_circuit_breaker_aware"
    description: "Circuit breaker awareness for backend protection"
# Capabilities provided by this node
capabilities:
  - name: "metrics_rollup"
    description: "Aggregate per-model performance metrics from delta bundles"
  - name: "idempotent_upsert"
    description: "ON CONFLICT DO UPDATE for atomic counter increments"
  - name: "period_based_rollups"
    description: "Support time-period aggregation for dashboard views"
  - name: "circuit_breaker_protection"
    description: "Protect PostgreSQL with circuit breaker pattern"
# Health check configuration
health_check:
  enabled: true
  endpoint: "/health"
  interval_seconds: 30
  backends:
    - name: "postgres"
      check_type: "connection"
      timeout_ms: 5000
# Metadata
metadata:
  author: "OmniNode Team"
  license: "MIT"
  created: "2026-03-07"
  updated: "2026-03-07"
  tags:
    - effect
    - delta-metrics
    - postgresql
    - persistence
    - rollup
    - circuit-breaker
  related_tickets:
    - "OMN-3142"
