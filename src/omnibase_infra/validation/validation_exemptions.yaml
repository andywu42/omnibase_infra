    reason: >
      Kafka-based contract source requires: discovery (discover_handlers), cache access (get_cached_descriptor, cached_count), event handling (on_contract_registered, on_contract_deregistered), and lifecycle (clear_cache). Protocol compliance with ProtocolContractSource requires discover_handlers and source_type.

