version: "1.0.0"
description: "Artifact registry for omnibase_infra documentation — tracks docs, design specs, and reference material that must be kept in sync with code changes."

artifacts:
  # ── Architecture Documentation ──────────────────────────────────────────────

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000001"
    artifact_type: "doc"
    title: "Handler Protocol-Driven Architecture"
    path: "docs/architecture/HANDLER_PROTOCOL_DRIVEN_ARCHITECTURE.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["handler", "architecture", "protocol"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["handler_routing"]
      - pattern: "src/omnibase_infra/nodes/handlers/**/*.py"
        change_scope: "any"

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000002"
    artifact_type: "doc"
    title: "Event Bus Integration Guide"
    path: "docs/architecture/EVENT_BUS_INTEGRATION_GUIDE.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["event-bus", "kafka", "architecture"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["event_bus.publish_topics", "event_bus.subscribe_topics"]
      - pattern: "src/omnibase_infra/nodes/handlers/kafka/**/*.py"
        change_scope: "any"

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000003"
    artifact_type: "reference"
    title: "Topic Catalog Architecture"
    path: "docs/architecture/TOPIC_CATALOG_ARCHITECTURE.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "strict"
    tags: ["kafka", "topics", "reference", "event-bus"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["event_bus.publish_topics", "event_bus.subscribe_topics"]

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000004"
    artifact_type: "doc"
    title: "Node Registration Workflow"
    path: "docs/architecture/REGISTRATION_WORKFLOW.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["registration", "architecture", "workflow"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/node_registration_reducer/**/*.py"
        change_scope: "any"
      - pattern: "src/omnibase_infra/nodes/node_registration_storage_effect/**/*.py"
        change_scope: "any"
      - pattern: "src/omnibase_infra/nodes/node_registration_reducer/contract.yaml"
        change_scope: "structural"

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000005"
    artifact_type: "doc"
    title: "Message Dispatch Engine"
    path: "docs/architecture/MESSAGE_DISPATCH_ENGINE.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["dispatch", "routing", "architecture"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/handlers/**/*.py"
        change_scope: "structural"
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["handler_routing.routing_strategy"]

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000006"
    artifact_type: "doc"
    title: "LLM Infrastructure Guide"
    path: "docs/architecture/LLM_INFRASTRUCTURE.md"
    repo: "omnibase_infra"
    owner_hint: "platform-ml"
    update_policy: "warn"
    tags: ["llm", "inference", "architecture"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/node_llm_embedding_effect/**/*.py"
        change_scope: "any"
      - pattern: "src/omnibase_infra/nodes/node_llm_inference_effect/**/*.py"
        change_scope: "any"
      - pattern: "src/omnibase_infra/nodes/node_llm_embedding_effect/contract.yaml"
        change_scope: "structural"

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000007"
    artifact_type: "doc"
    title: "Config Discovery Architecture"
    path: "docs/architecture/CONFIG_DISCOVERY.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["config", "infisical", "architecture"]
    source_triggers:
      - pattern: "src/omnibase_infra/runtime/config_discovery/**/*.py"
        change_scope: "any"
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["dependencies"]

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000008"
    artifact_type: "doc"
    title: "Current Node Architecture"
    path: "docs/architecture/CURRENT_NODE_ARCHITECTURE.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["nodes", "architecture", "overview"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["node_type"]
      - pattern: "src/omnibase_infra/nodes/*/node.py"
        change_scope: "structural"

  # ── Pattern Documentation ────────────────────────────────────────────────────

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000009"
    artifact_type: "reference"
    title: "Circuit Breaker Implementation Pattern"
