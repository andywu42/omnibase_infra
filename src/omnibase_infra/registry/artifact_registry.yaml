    update_policy: "strict"
    tags: ["adr", "routing", "dispatch"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/handlers/**/*.py"
        change_scope: "structural"
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["handler_routing.routing_strategy"]

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000013"
    artifact_type: "design_spec"
