    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "warn"
    tags: ["circuit-breaker", "resilience", "pattern"]
    source_triggers:
      - pattern: "src/omnibase_infra/mixins/mixin_async_circuit_breaker.py"
        change_scope: "any"
      - pattern: "src/omnibase_infra/nodes/handlers/**/*.py"
        change_scope: "structural"

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000010"
    artifact_type: "reference"
    title: "Handler Plugin Loader Pattern"
    path: "docs/patterns/handler_plugin_loader.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "require"
    tags: ["handler", "plugin-loader", "pattern", "security"]
    source_triggers:
      - pattern: "src/omnibase_infra/nodes/*/contract.yaml"
        change_scope: "structural"
        match_fields: ["handler_routing"]
      - pattern: "src/omnibase_infra/runtime/handler_plugin_loader.py"
        change_scope: "any"

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000011"
    artifact_type: "reference"
    title: "Error Handling Patterns"
    path: "docs/patterns/error_handling_patterns.md"
    repo: "omnibase_infra"
    owner_hint: "platform-core"
    update_policy: "warn"
    tags: ["errors", "pattern", "resilience"]
    source_triggers:
      - pattern: "src/omnibase_infra/errors/**/*.py"
        change_scope: "structural"
      - pattern: "src/omnibase_infra/models/model_infra_error_context.py"
        change_scope: "any"

  # ── Design Specs (ADRs) ──────────────────────────────────────────────────────

  - artifact_id: "a1b2c3d4-0001-0001-0001-000000000012"
    artifact_type: "design_spec"
    title: "ADR-006: Message Dispatch Engine Canonical Routing"
    path: "docs/decisions/adr-006-message-dispatch-engine-canonical-routing.md"
    repo: "omnibase_infra"
