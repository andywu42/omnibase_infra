# Handler contract for HandlerFileSystem (filesystem operations)
# Part of OMN-1317: Handler contract discovery setup
# Unique identifier for this handler
name: handler-filesystem
# Fully qualified class path for dynamic import
handler_class: omnibase_infra.handlers.handler_filesystem.HandlerFileSystem
# Handler behavioral classification:
# This handler is 'effect' because it performs filesystem I/O operations
handler_type: effect
# Tags for discovery and filtering
tags:
  - filesystem
  - file
  - io
  - infrastructure
  - effect
# Security metadata for handler loading validation
security:
  # Trusted namespace - loader should verify class is from trusted namespace
  trusted_namespace: omnibase_infra.handlers
  # Audit logging - enable for security-sensitive handlers
  audit_logging: true
# Environment variable configuration (used when initialize() receives a config
# dict without an explicit allowed_paths key):
#   FS_ALLOWED_PATHS - Comma-separated list of allowed directory paths
#   Default: /app,/workspace,/tmp (standard container runtime paths)
