# Redpanda Services for the cloud data-plane bus.
#
# Ticket: OMN-3488
# Namespace: data-plane (on k3s at 192.168.86.201)
#
# Two services:
#   1. ClusterIP (omninode-redpanda) — internal cluster access on port 9092
#   2. NodePort  (omninode-redpanda-external) — exposes port 29092 on the host node
#      This is the SSH tunnel target:
#        Mac: localhost:29092  →  SSH  →  192.168.86.201:29092  →  redpanda pod:9093 (external listener)
# Internal ClusterIP service — used by in-cluster consumers
apiVersion: v1
kind: Service
metadata:
  name: omninode-redpanda
  namespace: data-plane
  labels:
    app: omninode-redpanda
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/instance: omninode-redpanda
    app.kubernetes.io/managed-by: omninode-infra
    omninode.ai/bus: cloud
spec:
  type: ClusterIP
  selector:
    app: omninode-redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka-internal
      protocol: TCP
    - name: admin
      port: 9644
      targetPort: admin
      protocol: TCP
    - name: proxy
      port: 8082
      targetPort: proxy
      protocol: TCP
    - name: schema-registry
      port: 8081
      targetPort: schema-registry
      protocol: TCP
---
# NodePort service — exposes Kafka on host port 29092 for SSH tunnel
# The tunnel script (OMN-3478) forwards: Mac:29092 → SSH → 192.168.86.201:29092
apiVersion: v1
kind: Service
metadata:
  name: omninode-redpanda-external
  namespace: data-plane
  labels:
    app: omninode-redpanda
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/instance: omninode-redpanda
    app.kubernetes.io/managed-by: omninode-infra
    omninode.ai/bus: cloud
    omninode.ai/exposure: nodeport
spec:
  type: NodePort
  selector:
    app: omninode-redpanda
  ports:
    - name: kafka-nodeport
      port: 9093
      targetPort: kafka-external
      nodePort: 29092
      protocol: TCP
