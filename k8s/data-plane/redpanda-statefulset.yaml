# Redpanda single-broker StatefulSet for the cloud data-plane bus.
#
# Ticket: OMN-3488
# Namespace: data-plane (on k3s at 192.168.86.201)
#
# This broker is the cloud bus target. The Mac connects via SSH tunnel:
#   localhost:29092  →  SSH →  192.168.86.201:29092 (NodePort)  →  redpanda:9092
#
# Bus selection: cloud bus (bus-cloud) — NOT the local Docker bus (localhost:19092).
# See ~/.claude/CLAUDE.md "Bus Selection Policy".
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omninode-redpanda
  namespace: data-plane
  labels:
    app: omninode-redpanda
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/instance: omninode-redpanda
    app.kubernetes.io/managed-by: omninode-infra
    omninode.ai/bus: cloud
spec:
  serviceName: omninode-redpanda
  replicas: 1
  selector:
    matchLabels:
      app: omninode-redpanda
  template:
    metadata:
      labels:
        app: omninode-redpanda
        omninode.ai/bus: cloud
    spec:
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      terminationGracePeriodSeconds: 30
      containers:
        - name: redpanda
          # Pin to a specific Redpanda release for reproducibility.
          # Update in sync with local omnibase_infra Docker Redpanda version.
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command:
            - /usr/bin/rpk
            - redpanda
            - start
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --node-id=0
            - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:9093
            - --advertise-kafka-addr=internal://omninode-redpanda.data-plane.svc.cluster.local:9092,external://192.168.86.201:29092
            - --pandaproxy-addr=internal://0.0.0.0:8082
            - --advertise-pandaproxy-addr=internal://omninode-redpanda.data-plane.svc.cluster.local:8082
            - --schema-registry-addr=internal://0.0.0.0:8081
            - --rpc-addr=omninode-redpanda.data-plane.svc.cluster.local:33145
            - --advertise-rpc-addr=omninode-redpanda.data-plane.svc.cluster.local:33145
            - --mode=dev-container
          ports:
            - name: kafka-internal
              containerPort: 9092
              protocol: TCP
            - name: kafka-external
              containerPort: 9093
              protocol: TCP
            - name: admin
              containerPort: 9644
              protocol: TCP
            - name: proxy
              containerPort: 8082
              protocol: TCP
            - name: schema-registry
              containerPort: 8081
              protocol: TCP
            - name: rpc
              containerPort: 33145
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1.5Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
